    <style>/* Contenitore Carosello - Diventa un blocco nel flusso */
.carousel-container {
    position: relative;
    width: 100%; /* Meglio 100% che 100vw per evitare scroll bar orizzontali */
    min-height: 65vh; /* Altezza minima per evitare problemi con immagini molto piccole */
    margin: 0 auto;
    aspect-ratio: 16 / 9; /* Fondamentale: crea lo spazio per le immagini absolute */
    overflow: hidden;
    margin-bottom: 3%;
}

.slide {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 0.5s ease-in-out;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1;
}

.slide.active { 
    opacity: 1; 
    z-index: 2; /* Sopra le altre slide */
}

.slide img {
    width: 100%;
    height: 100%;
    object-fit: contain; /* 'contain' per vedere tutta la foto, 'cover' per riempire il rettangolo */
}
    
        /* Overlay per i crediti */
        .info-overlay {
            position: absolute;
            bottom: 30px;
            left: 20px;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
            pointer-events: none;
        }

        .info-overlay h2 { font-size: 1.2rem; margin: 0; letter-spacing: 2px; }
        .info-overlay p { font-size: 0.8rem; margin: 5px 0; opacity: 0.8; }

        /* Frecce di Navigazione */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            font-size: 2rem;
            cursor: pointer;
            z-index: 30; /* Sopra le zone di click */
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-arrow:active {
            background: rgba(255, 255, 255, 0.3);
            scale: 0.9;
        }

        .arrow-left { left: 15px; }
        .arrow-right { right: 15px; }

        /* Zone di click invisibili (mantengono la funzionalità su tutto lo schermo) */
        .click-zone {
            position: absolute;
            top: 0;
            height: 100%;
            width: 50%;
            z-index: 20;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .click-right { right: 0; }
        .click-left { left: 0; }

        /* Nascondi frecce su schermi molto piccoli se preferisci solo swipe, 
           ma qui le lasciamo visibili e stilizzate */
        @media (max-width: 480px) {
            .nav-arrow { width: 40px; height: 40px; font-size: 1.5rem; }
        }
    </style>
</head>

<script>
    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');

    function changeSlide(direction) {
        slides[currentSlide].classList.remove('active');
        currentSlide = (currentSlide + direction + slides.length) % slides.length;
        slides[currentSlide].classList.add('active');
    }

    // Supporto Swipe per Mobile
    let touchstartX = 0;
    let touchendX = 0;
    
    document.addEventListener('touchstart', e => touchstartX = e.changedTouches[0].screenX, {passive: true});
    document.addEventListener('touchend', e => {
        touchendX = e.changedTouches[0].screenX;
        handleSwipe();
    }, {passive: true});

    function handleSwipe() {
        if (touchstartX - touchendX > 50) changeSlide(1); // Swipe verso sinistra -> vai avanti
        if (touchendX - touchstartX > 50) changeSlide(-1); // Swipe verso destra -> vai indietro
    }
</script>
